<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAKRX | WhatsApp Bot Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .wa-container { max-width: 520px; margin: 60px auto; padding: 0 20px; }
        .wa-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .wa-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .wa-card p { color: var(--text-secondary, #6b7280); font-size: 0.9rem; margin-bottom: 24px; }
        .qr-box {
            width: 280px; height: 280px; margin: 0 auto 24px;
            border-radius: 16px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #f9fafb; border: 2px dashed var(--border, #e5e7eb);
            transition: all 0.3s ease;
        }
        .qr-box img { width: 100%; height: 100%; object-fit: contain; }
        .qr-box.connected {
            border: 2px solid #22c55e; background: #f0fdf4;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 600;
            margin-bottom: 16px;
        }
        .status-badge.disconnected { background: #fef2f2; color: #dc2626; }
        .status-badge.qr { background: #fffbeb; color: #d97706; }
        .status-badge.connected { background: #f0fdf4; color: #16a34a; }
        .status-badge.reconnecting { background: #eff6ff; color: #2563eb; }
        .status-badge.offline { background: #f3f4f6; color: #6b7280; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block;
        }
        .status-dot.disconnected { background: #dc2626; }
        .status-dot.qr { background: #d97706; animation: pulse 1.5s infinite; }
        .status-dot.connected { background: #16a34a; }
        .status-dot.reconnecting { background: #2563eb; animation: pulse 1s infinite; }
        .status-dot.offline { background: #9ca3af; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .phone-info { font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px; }
        .phone-info strong { color: var(--accent, #6366f1); }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--accent, #6366f1); text-decoration: none; font-weight: 500;
            font-size: 0.85rem; margin-top: 20px;
        }
        .back-link:hover { text-decoration: underline; }
        .spinner-small {
            width: 20px; height: 20px; border: 3px solid #e5e7eb;
            border-top-color: var(--accent, #6366f1); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .instructions {
            text-align: left; background: #f9fafb; border-radius: 12px;
            padding: 16px 20px; margin-top: 20px; font-size: 0.82rem; color: #374151;
        }
        .instructions ol { margin: 8px 0 0 16px; padding: 0; }
        .instructions li { margin-bottom: 6px; }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="../" style="text-decoration:none;"><span class="logo-text">TRAKR<span class="highlight">X</span></span></a>
            <div class="nav-tabs">
                <a href="../" class="nav-btn" style="text-decoration:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                    <span>Dashboard</span>
                </a>
                <button class="nav-btn active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <span>WhatsApp</span>
                </button>
            </div>
            <div class="nav-end"></div>
        </div>
    </nav>

    <div class="wa-container">
        <div class="wa-card">
            <h1>🤖 FinBot Connection</h1>
            <p>Connect your WhatsApp to enable the bot in your groups.</p>

            <div id="status-badge" class="status-badge offline">
                <span class="status-dot offline"></span>
                <span id="status-text">Checking...</span>
            </div>

            <div class="qr-box" id="qr-box">
                <div class="spinner-small"></div>
            </div>

            <div id="phone-info" class="phone-info" style="display:none;"></div>

            <div class="instructions">
                <strong>How to connect:</strong>
                <ol>
                    <li>Open WhatsApp on your phone</li>
                    <li>Go to <strong>Settings → Linked Devices</strong></li>
                    <li>Tap <strong>"Link a Device"</strong></li>
                    <li>Scan the QR code above</li>
                </ol>
            </div>

            <a href="../" class="back-link">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://finnet-backend.onrender.com';
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const qrBox = document.getElementById('qr-box');
        const phoneInfo = document.getElementById('phone-info');

        const labels = {
            connected: '✅ Connected',
            qr: '📱 Scan QR Code',
            disconnected: '❌ Disconnected',
            reconnecting: '🔄 Reconnecting...',
            offline: '⚫ Bot Offline',
            logged_out: '🚫 Logged Out',
        };

        async function pollStatus() {
            try {
                const res = await fetch(`${API_BASE}/api/whatsapp/status`);
                const data = await res.json();
                const s = data.state || 'offline';

                // Update badge
                statusBadge.className = `status-badge ${s}`;
                statusBadge.innerHTML = `<span class="status-dot ${s}"></span><span>${labels[s] || s}</span>`;

                // Update QR box
                if (s === 'qr' && data.qrBase64) {
                    qrBox.className = 'qr-box';
                    qrBox.innerHTML = `<img src="${data.qrBase64}" alt="QR Code">`;
                } else if (s === 'connected') {
                    qrBox.className = 'qr-box connected';
                    qrBox.innerHTML = `<div style="font-size:4rem;">✅</div>`;
                    if (data.phone) {
                        phoneInfo.style.display = 'block';
                        phoneInfo.innerHTML = `Connected as: <strong>+${data.phone}</strong>`;
                    }
                } else if (s === 'reconnecting') {
                    qrBox.className = 'qr-box';
                    qrBox.innerHTML = `<div class="spinner-small"></div><p style="margin-top:12px;color:#6b7280;font-size:0.85rem;">Reconnecting...</p>`;
                } else {
                    qrBox.className = 'qr-box';
                    qrBox.innerHTML = `<p style="color:#9ca3af;font-size:0.85rem;">Waiting for bot to start...</p>`;
                }
            } catch (e) {
                statusBadge.className = 'status-badge offline';
                statusBadge.innerHTML = '<span class="status-dot offline"></span><span>Backend Unreachable</span>';
                qrBox.className = 'qr-box';
                qrBox.innerHTML = '<p style="color:#9ca3af;font-size:0.85rem;">Cannot reach server</p>';
            }
        }

        // Poll every 3 seconds
        pollStatus();
        setInterval(pollStatus, 3000);
    </script>
</body>
</html>
